name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Publish self-contained exe
        run: dotnet publish dashboard/ChiptuningAi.Dashboard.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Rename output
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Rename-Item -Path "publish\ChiptuningAi.Dashboard.exe" -NewName "ChiptuningAi-Dashboard-$tag-win-x64.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: publish/ChiptuningAi-Dashboard-${{ github.ref_name }}-win-x64.exe
